<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0; padding:0; background:#333840; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background:#333840; padding:60px 20px;">
    <tr>
      <td align="center">
        <table width="480" cellpadding="0" cellspacing="0" style="max-width:480px;">
          {% if site.avatar %}
          <tr>
            <td align="center" style="padding-bottom:12px;">
              <img src="{{ site.avatar }}" alt="" width="48" height="48" style="border-radius:50%; display:block;">
            </td>
          </tr>
          {% endif %}
          <tr>
            <td align="center" style="padding-bottom:32px; font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:0.05em; color:#999;">
              {{ site.title }}
            </td>
          </tr>
          <tr>
            <td style="background:#3c4149; border-radius:16px; padding:40px 32px;">
              <p style="margin:0 0 16px; font-size:16px; line-height:1.6; color:#ccc;">
                <strong style="color:#fff;">{{ commenter_name }}</strong> commented on <strong style="color:#fff;">{{ post.title or 'your post' }}</strong>:
              </p>
              <p style="margin:0 0 28px; font-size:16px; line-height:1.6; color:#ccc; border-left:3px solid #555; padding-left:16px;">
                {{ comment_body }}
              </p>
              <a href="{{ post_url }}" style="display:inline-block; padding:12px 28px; background:#117a65; color:#fff; font-size:14px; font-weight:600; text-decoration:none; border-radius:999px;">View comment</a>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
