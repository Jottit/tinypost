{% extends "base.html" %}
{% block title %}Sign up — tinypost{% endblock %}
{% block body %}
  <main class="page-centered">
    <h1 class="title">What's your email?</h1>
    <p class="subtitle">We'll send you a passcode</p>
    <form action="/signup" method="post" class="email-form">
      <input type="hidden" name="subdomain" value="{{ subdomain }}">
      <input type="email" name="email" class="email-input" placeholder="" required autofocus>
      <button type="submit" class="btn-claim">Send passcode</button>
    </form>
  </main>
{% endblock %}
