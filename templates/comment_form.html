<form class="comment-form" data-slug="{{ post.slug }}" data-logged-in="{{ 'true' if user else 'false' }}">
  <input type="text" name="website" class="hidden" tabindex="-1" autocomplete="off">
  <div class="comment-fields">
    <input type="text" name="name" placeholder="Your name" value="{{ user.name or '' if user else '' }}" required>
    {% if not user %}
      <input type="email" name="email" placeholder="Your email" required>
    {% endif %}
  </div>
  <textarea name="body" placeholder="What are your thoughts?" required></textarea>
  <div class="comment-form-footer">
    <div class="comment-identity" hidden>
      Commenting as <strong class="comment-identity-name"></strong> · <a href="#" class="comment-not-you">Not you?</a>
    </div>
    <button type="submit" class="btn btn--outline comment-submit">Post</button>
  </div>
  <div class="comment-passcode" hidden>
    <p class="comment-verify-msg"></p>
    <div class="passcode-inputs">
      <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]" autocomplete="one-time-code">
      <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
      <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
      <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
      <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
      <input type="text" maxlength="1" inputmode="numeric" pattern="[0-9]">
    </div>
    <p class="comment-error" hidden></p>
  </div>
</form>
<script src="/static/comments.js"></script>
