{% if is_owner %}
<div class="admin-banner">
  <a href="http://{{ config.BASE_DOMAIN }}" class="admin-banner-home">tinypost</a>
  <a href="/-/edit" class="btn btn--primary">Write</a>
  {% if site.avatar %}
    <a href="/-/settings" class="admin-avatar" aria-label="Settings">
      <img src="{{ site.avatar }}" alt="Menu">
    </a>
  {% else %}
    {% set words = site.title.split() %}
    <a href="/-/settings" class="admin-initials" aria-label="Settings">
      {{ words[0][0] | upper }}{% if words | length > 1 %}{{ words[1][0] | upper }}{% endif %}
    </a>
  {% endif %}
</div>
{% endif %}
