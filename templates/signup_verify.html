{% extends "base.html" %}
{% block title %}Verify — Jottit{% endblock %}
{% block body %}
  <main class="home">
    <p>We sent a 6-digit code to <strong>{{ email }}</strong>.<br>Enter it below to verify your account.</p>
    {% if error %}
      <p class="error">{{ error }}</p>
    {% endif %}
    <form action="/verify" method="post" class="passcode-form">
      <input type="hidden" name="passcode" id="passcode-value">
      <div class="passcode-inputs">
        <input type="text" inputmode="numeric" maxlength="1" required autofocus>
        <input type="text" inputmode="numeric" maxlength="1" required>
        <input type="text" inputmode="numeric" maxlength="1" required>
        <input type="text" inputmode="numeric" maxlength="1" required>
        <input type="text" inputmode="numeric" maxlength="1" required>
        <input type="text" inputmode="numeric" maxlength="1" required>
      </div>
    </form>
  </main>
  <script>
    const inputs = document.querySelectorAll('.passcode-inputs input');
    const hidden = document.getElementById('passcode-value');
    const form = document.querySelector('.passcode-form');

    function trySubmit() {
      const code = Array.from(inputs).map(el => el.value).join('');
      if (code.length === 6) {
        hidden.value = code;
        form.submit();
      }
    }

    inputs.forEach((input, i) => {
      input.addEventListener('input', () => {
        input.value = input.value.replace(/\D/g, '');
        if (input.value && i < inputs.length - 1) inputs[i + 1].focus();
        trySubmit();
      });
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Backspace' && !input.value && i > 0) inputs[i - 1].focus();
      });
      input.addEventListener('paste', (e) => {
        const paste = (e.clipboardData || window.clipboardData).getData('text').replace(/\D/g, '');
        if (!paste) return;
        e.preventDefault();
        for (let j = 0; j < inputs.length && j < paste.length; j++) {
          inputs[j].value = paste[j];
        }
        inputs[Math.min(paste.length, inputs.length) - 1].focus();
        trySubmit();
      });
    });
  </script>
{% endblock %}
