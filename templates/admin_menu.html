{% if is_owner %}
<div class="admin-menu">
  {% if show_back_link %}<a href="/" class="back-link btn btn--sm">&larr;</a>{% endif %}
  <button type="button" class="btn btn--sm" onclick="openWriteModal()"><svg class="icon" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.25" opacity="0.7" stroke-linecap="round" stroke-linejoin="round"><path d="M11.5 1.5l3 3-9 9H2.5v-3z"/><path d="M10 3l3 3"/></svg> Write</button>
  <input type="checkbox" id="admin-toggle" hidden>
  {% if site.avatar %}
    <label for="admin-toggle" class="admin-avatar">
      <img src="{{ site.avatar }}" alt="Menu">
    </label>
  {% else %}
    {% set words = site.title.split() %}
    <label for="admin-toggle" class="admin-initials">
      {{ words[0][0] | upper }}{% if words | length > 1 %}{{ words[1][0] | upper }}{% endif %}
    </label>
  {% endif %}
  <div class="admin-dropdown">
    <a href="/-/settings">Settings</a>
    <a href="/-/subscribers">Subscribers</a>
    <hr class="admin-dropdown-divider">
    <form method="POST" action="/signout">
      <button type="submit">Sign out</button>
    </form>
  </div>
</div>
<link rel="stylesheet" href="/static/js/jot.css">
<div id="write-modal" class="write-modal" hidden>
  <div class="write-modal-overlay" onclick="closeWriteModal()"></div>
  <div class="write-modal-content">
    <button type="button" class="write-modal-expand" onclick="expandWriteModal()" title="Fullscreen editor"><svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 2h4v4"/><path d="M6 14H2v-4"/><path d="M14 2l-5 5"/><path d="M2 14l5-5"/></svg></button>
    <form id="write-modal-form">
      <input type="text" name="title" placeholder="Title (optional)" class="editor-title">
      <input type="hidden" name="body">
      <div id="write-modal-editor" class="editor-body"></div>
      <div class="write-modal-actions">
        <label class="editor-draft">
          <input type="checkbox" name="is_draft"> Keep this a draft
        </label>
        <button type="button" class="btn btn--outline ml-auto" onclick="cancelWriteModal()">Cancel</button>
        <button type="submit" class="btn btn--primary">Publish</button>
      </div>
    </form>
  </div>
</div>
<script type="module" src="/static/write-modal.js"></script>
<script>
  document.addEventListener('click', function(e) {
    var toggle = document.getElementById('admin-toggle');
    if (toggle.checked && !e.target.closest('.admin-menu')) toggle.checked = false;
  });
</script>
{% endif %}
