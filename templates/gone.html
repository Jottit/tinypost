<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jottit — rebuilding</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8f8f8;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, sans-serif;
        }

        .center {
            text-align: center;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            line-height: 1;
        }

        .logo .j { color: #1a5c3a; }
        .logo .o1 { color: #2a7d4f; }
        .logo .t1 { color: #3a9d64; }
        .logo .t2 { color: #4dba7a; }
        .logo .i { color: #62d592; }
        .logo .t3 { color: #7eeaab; }

        .message {
            margin-top: 1.5rem;
            font-size: 1.05rem;
            color: #666;
            line-height: 1.6;
            max-width: 28em;
        }

        a {
            color: #2a7d4f;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="center">
        <a href="/" class="logo"><span class="j">J</span><span class="o1">o</span><span class="t1">t</span><span class="t2">t</span><span class="i">i</span><span class="t3">t</span></a>
        <p class="message">This page is gone. Jottit is being rebuilt.</p>
    </div>
</body>
</html>
