{% extends "base.html" %}
{% block title %}Comments — {{ site.title }}{% endblock %}
{% block body %}
  <div class="panel-page">
    <a href="/-/settings" class="panel-back">&larr; Settings</a>
    <h1 class="panel-title">Comments</h1>
    <div class="panel panel--narrow">
      <form method="POST" action="/-/settings/comments" class="settings-form auto-save">
        <label class="checkbox-label">
          <input type="checkbox" name="comments_enabled"{{ ' checked' if site.comments_enabled }}>
          Enable comments on posts
        </label>
      </form>
    </div>
  </div>
  <script src="/static/auto-save.js"></script>
{% endblock %}
