{% extends "base.html" %}
{% block title %}{% if post %}Edit — {{ site.title }}{% else %}Write — {{ site.title }}{% endif %}{% endblock %}
{% block body_attrs %} class="editor-page"{% endblock %}
{% block body %}
  <main class="editor">
    {% if error %}
      <p class="editor-error">{{ error }}</p>
    {% endif %}
    <form method="POST" action="{% if post %}/edit/{{ post.slug }}{% else %}/edit{% endif %}">
      <input type="text" name="title" placeholder="Title" class="editor-title" value="{{ post.title or '' if post else '' }}" {% if not post %}autofocus{% endif %}>
      <textarea name="body" placeholder="Write here..." class="editor-body" {% if post %}autofocus{% endif %}>{{ post.body if post else '' }}</textarea>
      <button type="submit" class="btn">Save and publish</button>
    </form>
  </main>
  <script src="{{ url_for('static', filename='editor.js') }}"></script>
{% endblock %}
