{% extends "base.html" %}
{% block title %}Choose your address — tinypost{% endblock %}
{% block body %}
  <main class="page-centered">
    <h1 class="title">Choose your address</h1>
    <p class="subtitle">This will be your blog's URL</p>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form action="/signup/address" method="post" class="email-form">
      <div class="address-input">
        <input type="text" name="subdomain" class="email-input" placeholder="yourname" value="{{ suggested or subdomain or '' }}" required autofocus>
        <span class="address-suffix">.tinypost.blog</span>
      </div>
      <button type="submit" class="btn btn--outline btn--lg">Next</button>
    </form>
  </main>
  <script>
    (function() {
      var input = document.querySelector('.address-input input');
      var form = input.closest('form');
      var subtitle = document.querySelector('.subtitle');
      var errorEl = document.querySelector('.error');
      var timer;
      var available = true;

      form.addEventListener('submit', function(e) {
        if (!available) e.preventDefault();
      });

      function checkAvailability() {
        var name = input.value.toLowerCase().trim();
        if (!name || !/^[a-z0-9]([a-z0-9-]{0,30}[a-z0-9])?$/.test(name)) return;
        fetch('/check-subdomain?name=' + encodeURIComponent(name))
          .then(function(r) { return r.json(); })
          .then(function(data) {
            if (input.value.toLowerCase().trim() !== name) return;
            if (data.available) {
              subtitle.textContent = name + '.tinypost.blog is available';
              subtitle.className = 'subtitle success';
            } else {
              available = false;
              subtitle.textContent = name + '.tinypost.blog is not available';
              subtitle.className = 'subtitle error';
            }
          });
      }
      function resize() {
        input.style.width = Math.max(3, input.value.length || input.placeholder.length) + 'ch';
      }
      resize();
      input.focus();
      input.setSelectionRange(input.value.length, input.value.length);

      input.addEventListener('input', function() {
        resize();
        clearTimeout(timer);
        available = true;
        if (errorEl) { errorEl.remove(); errorEl = null; }
        var name = input.value.toLowerCase().trim();
        if (!name || !/^[a-z0-9]([a-z0-9-]{0,30}[a-z0-9])?$/.test(name)) {
          subtitle.textContent = "This will be your blog's URL";
          subtitle.className = 'subtitle';
          return;
        }
        timer = setTimeout(checkAvailability, 300);
      });
    })();
  </script>
{% endblock %}
