{% extends "base.html" %}
{% block title %}Design — {{ site.title }}{% endblock %}
{% block body %}
  <div class="panel-page">
    <a href="/-/settings" class="panel-back">&larr; Settings</a>
    <h1 class="panel-title">Design</h1>
    <div class="panel panel--narrow">
      {% for message in get_flashed_messages() %}
        <p class="panel-notice success">{{ message }}</p>
      {% endfor %}
      {% if error %}
        <p class="error">{{ error }}</p>
      {% endif %}
      <form method="POST" action="/-/design" id="design-form" class="settings-form auto-save">
        <label for="font_header">Heading font</label>
        <select id="font_header" name="font_header">
          {% for name, value in font_options %}
            <option value="{{ value }}" {% if design.get('font_header', '') == value %}selected{% endif %}>{{ name }}</option>
          {% endfor %}
        </select>

        <label for="font_body" class="mt-6">Body font</label>
        <select id="font_body" name="font_body">
          {% for name, value in font_options %}
            <option value="{{ value }}" {% if design.get('font_body', '') == value %}selected{% endif %}>{{ name }}</option>
          {% endfor %}
        </select>

        <label for="color_accent_picker" class="mt-6">Accent color</label>
        <div class="color-field">
          <input type="color" id="color_accent_picker" value="{{ design.get('color_accent') or '#333333' }}">
          <input type="text" id="color_accent" name="color_accent" value="{{ design.get('color_accent', '') }}">
        </div>

        <label for="color_bg_picker" class="mt-6">Background color</label>
        <div class="color-field">
          <input type="color" id="color_bg_picker" value="{{ design.get('color_bg') or '#f5f5f0' }}">
          <input type="text" id="color_bg" name="color_bg" value="{{ design.get('color_bg', '') }}">
        </div>

        <label for="color_text_picker" class="mt-6">Text color</label>
        <div class="color-field">
          <input type="color" id="color_text_picker" value="{{ design.get('color_text') or '#333333' }}">
          <input type="text" id="color_text" name="color_text" value="{{ design.get('color_text', '') }}">
        </div>

      </form>

    </div>
  </div>
  <script src="/static/auto-save.js"></script>
  <script>
    // Sync color pickers with text inputs
    document.querySelectorAll('.color-field').forEach(function(field) {
      var picker = field.querySelector('input[type="color"]');
      var text = field.querySelector('input[type="text"]');
      if (!picker || !text) return;
      picker.addEventListener('input', function() {
        text.value = picker.value;
        text.dispatchEvent(new Event('input', {bubbles: true}));
      });
      text.addEventListener('input', function() {
        if (/^#[0-9a-f]{6}$/i.test(text.value)) picker.value = text.value;
      });
    });

  </script>
{% endblock %}
