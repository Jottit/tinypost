{% extends "base.html" %}
{% block title %}Sign up — tinypost{% endblock %}
{% block body %}
  <main class="page-centered">
    <h1 class="title">What's your name?</h1>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form action="/signup/name" method="post" class="email-form">
      <input type="text" name="name" class="email-input" placeholder="" required autofocus>
      <button type="submit" class="btn btn--outline btn--lg">Next</button>
    </form>
  </main>
{% endblock %}
