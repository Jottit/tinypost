{% extends "base.html" %}
{% block title %}Sign up — tinypost{% endblock %}
{% block body %}
  <main class="page-centered">
    <h1 class="title">What's your name?</h1>
    <p class="subtitle">This will appear on your blog</p>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form action="/signup/email" method="post" class="email-form">
      <input type="text" name="name" class="email-input" placeholder="" required autofocus>
      <button type="submit" class="btn btn--outline">Continue</button>
    </form>
    <p class="text-muted mt-4">Already have an account? <a href="/signin">Sign in</a></p>
  </main>
{% endblock %}
