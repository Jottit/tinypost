{% extends "base.html" %}
{% block title %}Tinypost — self-owned publishing on the web{% endblock %}
{% block body %}
  <nav class="top-nav">
    {% include "user_menu.html" %}
  </nav>
  <main class="page-centered">
    <header class="mb-4">
      <h1 class="logo"><span>Tinypost</span></h1>
    </header>
    <form action="/" method="post" class="mb-4">
      <div class="pill-input pill-input-right">
        <input type="text" name="subdomain" placeholder="yourname" value="{{ subdomain or '' }}" required>
        <span class="pill-input-suffix">.tinypost.blog</span>
        <button type="submit">Go</button>
      </div>
    </form>
    <p class="{% if error %}error{% else %}text-muted{% endif %}">{{ error or "self-owned publishing on the web" }}</p>
  </main>
  {% include "home_footer.html" %}
  <script src="/static/home.js"></script>
{% endblock %}
