{% extends "base.html" %}
{% block title %}Jottit — self-owned publishing on the web{% endblock %}
{% block body %}
  <nav class="top-nav">
    <a href="/signin">Sign in</a>
  </nav>
  <main class="page-centered">
    <header class="mb-4">
      <h1 class="logo"><span>Jottit</span></h1>
    </header>
    <form action="/" method="post" class="mb-4">
      <div class="pill-input pill-input-right">
        <input type="text" name="subdomain" placeholder="yourname" required autofocus>
        <span class="pill-input-suffix">.jottit.pub</span>
        <button type="submit">Go</button>
      </div>
    </form>
    <p class="text-muted">self-owned publishing on the web</p>
  </main>
  <script>
    var input = document.querySelector('.pill-input input');
    function resize() {
      input.size = Math.min(20, Math.max(8, input.value.length || 8));
    }
    resize();
    input.addEventListener('input', resize);
  </script>
{% endblock %}
