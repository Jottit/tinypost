{% extends "base.html" %}
{% block title %}Jottit — self-owned publishing on the web{% endblock %}
{% block body %}
  <nav class="top-nav">
    {% if user_email %}
      <a href="{{ user_site_url }}">{{ user_email }}</a>
      &middot;
      <form action="/signout" method="post" class="inline">
        <button type="submit" class="link-button">sign out</button>
      </form>
    {% else %}
      <a href="/signin">sign in</a>
    {% endif %}
  </nav>
  <main class="page-centered">
    <header class="mb-4">
      <h1 class="logo"><span>Jottit</span></h1>
    </header>
    <form action="/" method="post" class="mb-4">
      <div class="pill-input pill-input-right">
        <input type="text" name="subdomain" placeholder="yourname" value="{{ subdomain or '' }}" required>
        <span class="pill-input-suffix">.jottit.pub</span>
        <button type="submit">Go</button>
      </div>
    </form>
    <p class="{% if error %}error{% else %}text-muted{% endif %}">{{ error or "self-owned publishing on the web" }}</p>
  </main>
  <script src="/static/home.js"></script>
{% endblock %}
