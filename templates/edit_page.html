{% extends "base.html" %}
{% block title %}Edit {{ page.title }} — {{ site.title }}{% endblock %}
{% block head_extra %}<link rel="stylesheet" href="/static/js/jot.css">{% endblock %}
{% block body_attrs %} class="editor-page"{% endblock %}
{% block body %}
  <main class="editor">
    {% if error %}
      <p class="editor-error">{{ error }}</p>
    {% endif %}
    <form method="POST" action="{{ '/-/new-page' if new else '/-/edit-page/' ~ page.slug }}">
      <input type="text" name="title" placeholder="Title" class="editor-title" value="{{ page.title }}" autofocus>
      <input type="hidden" name="body" value="{{ page.body }}">
      <div id="editor" class="editor-body"></div>
      <div class="editor-actions">
        <label class="editor-draft">
          <input type="checkbox" name="is_draft" {% if page.is_draft %}checked{% endif %}>
          Don't publish yet
        </label>
        <button type="submit" class="btn btn--primary">Save</button>
      </div>
    </form>
  </main>
  <script type="module" src="{{ url_for('static', filename='editor.js') }}"></script>
{% endblock %}
