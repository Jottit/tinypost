{% extends "base.html" %}
{% block title %}Update email — {{ site.title }}{% endblock %}
{% block body %}
  <main class="page-centered">
    <h1 class="title">What's your new email?</h1>
    <p class="subtitle">We'll send you a passcode to verify it</p>
    {% if error %}
      <p class="error">{{ error }}</p>
    {% endif %}
    <form action="/-/account/email" method="post" class="email-form">
      <input type="email" name="email" class="email-input" placeholder="" required autofocus>
      <button type="submit" class="btn-claim">Send passcode</button>
    </form>
  </main>
{% endblock %}
