<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jottit — simple publishing for the web</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8f8f8;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, sans-serif;
        }

        .center {
            text-align: center;
        }

        .logo {
            font-size: 4.5rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            line-height: 1;
        }

        .logo .j { color: #1a5c3a; }
        .logo .o1 { color: #2a7d4f; }
        .logo .t1 { color: #3a9d64; }
        .logo .t2 { color: #4dba7a; }
        .logo .i { color: #62d592; }
        .logo .t3 { color: #7eeaab; }

        .tagline {
            margin-top: 1rem;
            font-size: 1.05rem;
            color: #666;
            letter-spacing: 0.01em;
            font-family: "SF Mono", "Menlo", "Consolas", monospace;
        }
    </style>
</head>
<body>
    <div class="center">
        <div class="logo"><span class="j">J</span><span class="o1">o</span><span class="t1">t</span><span class="t2">t</span><span class="i">i</span><span class="t3">t</span></div>
        <p class="tagline">simple publishing for the web</p>
    </div>
</body>
</html>
